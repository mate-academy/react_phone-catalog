<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        const root = document.documentElement;

        let saved = localStorage.getItem('theme');

        if (saved !== 'dark' && saved !== 'light') {
          const systemDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches;
          saved = systemDark ? 'dark' : 'light';

          localStorage.setItem('theme', saved);
        }

        if (saved === 'dark') {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
      })();
    </script>

    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/img/icons/favicon.svg"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Books Catalog — Online Bookstore</title>
    <meta
      name="description"
      content="Browse, search, and purchase books in Paperback, Kindle, and Audiobook formats. Features real payment processing, multilingual support, and dark mode."
    />
    <meta
      name="theme-color"
      content="#3b2010"
    />

    <meta
      property="og:title"
      content="Books Catalog — Online Bookstore"
    />

      rel="stylesheet"
    />
  </head>
  <body>

</html>
