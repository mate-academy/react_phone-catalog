<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="70%" stop-color="#F5F5F7" />
      <stop offset="100%" stop-color="#E2E6E9" />
    </linearGradient>

    <linearGradient id="iphone-screen-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#476DF4" />
      <stop offset="15%" stop-color="#0F0F11" />
      <stop offset="55%" stop-color="#F86800" />
      <stop offset="100%" stop-color="#FF7A1A" />
    </linearGradient>

    <linearGradient id="titanium-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B4BDC3" />
      <stop offset="60%" stop-color="#89939A" />
      <stop offset="100%" stop-color="#0F0F11" />
    </linearGradient>

    <filter id="iphone-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="12" dy="24" stdDeviation="20" flood-color="#0F0F11" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#bg-gradient)" />

  <circle cx="850" cy="240" r="300" fill="#F86800" opacity="0.02" />
  <circle cx="700" cy="100" r="120" fill="#476DF4" opacity="0.01" />

  <g transform="translate(90, 0)">
    <text x="0" y="165" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" letter-spacing="1.8" fill="#F86800" text-transform="uppercase">The new</text>
    <text x="0" y="220" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="46" font-weight="700" letter-spacing="-0.8" fill="#0F0F11">iPhone Pro</text>
    <text x="0" y="268" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22" font-weight="400" letter-spacing="-0.3" fill="#89939A">Titanium to the core.</text>
    <text x="0" y="318" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" font-weight="400" fill="#0F0F11" opacity="0.65">A monumental leap for battery life. Pro-force camera system.</text>
  </g>

  <g transform="translate(800, 240)" filter="url(#iphone-shadow)">
    <rect x="-105" y="-210" width="210" height="420" rx="42" fill="url(#titanium-edge)" />
    <rect x="-103" y="-208" width="206" height="416" rx="40" fill="#0F0F11" />
    <rect x="-95" y="-200" width="190" height="400" rx="34" fill="#0F0F11" />
    <rect x="-92" y="-197" width="184" height="394" rx="31" fill="url(#iphone-screen-gradient)" />
    
    <path d="M -92,80 C -30,120 40,-40 92,20 L 92,197 L -92,197 Z" fill="#0F0F11" opacity="0.2" />
    <path d="M -50,197 C 0,100 50,150 92,80 L 92,197 Z" fill="#476DF4" opacity="0.15" />
    <path d="M -92,-197 C -30,-120 20,-150 92,-100 L 92,-197 Z" fill="#FFFFFF" opacity="0.05" />

    <rect x="-32" y="-182" width="64" height="18" rx="9" fill="#000000" />
    <circle cx="18" cy="-173" r="3.5" fill="#1C1C1E" />
  </g>
</svg>
