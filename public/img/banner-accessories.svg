<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="70%" stop-color="#F5F5F7" />
      <stop offset="100%" stop-color="#E2E6E9" />
    </linearGradient>

    <linearGradient id="watch-screen-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F86800" />
      <stop offset="60%" stop-color="#FF7A1A" />
      <stop offset="90%" stop-color="#0F0F11" />
      <stop offset="100%" stop-color="#476DF4" />
    </linearGradient>

    <linearGradient id="band-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D65200" />
      <stop offset="50%" stop-color="#F86800" />
      <stop offset="100%" stop-color="#FF7A1A" />
    </linearGradient>

    <linearGradient id="case-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E2E6E9" />
      <stop offset="40%" stop-color="#B4BDC3" />
      <stop offset="100%" stop-color="#89939A" />
    </linearGradient>

    <filter id="watch-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="10" dy="20" stdDeviation="18" flood-color="#0F0F11" flood-opacity="0.14" />
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#bg-gradient)" />

  <circle cx="850" cy="240" r="280" fill="#F86800" opacity="0.015" />
  <circle cx="950" cy="300" r="150" fill="#476DF4" opacity="0.01" />

  <g transform="translate(90, 0)">
    <text x="0" y="165" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="13" font-weight="600" letter-spacing="1.8" fill="#F86800" text-transform="uppercase">The new</text>
    <text x="0" y="220" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="46" font-weight="700" letter-spacing="-0.8" fill="#0F0F11">Watch Ultra</text>
    <text x="0" y="268" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22" font-weight="400" letter-spacing="-0.3" fill="#89939A">New peaks. Never higher.</text>
    <text x="0" y="318" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" font-weight="400" fill="#0F0F11" opacity="0.65">Rugged titanium case. Brightest Always‑On display ever.</text>
  </g>

  <g transform="translate(820, 240)" filter="url(#watch-shadow)">
    <path d="M -55,-130 L 55,-130 L 45,-230 L -45,-230 Z" fill="url(#band-gradient)" />
    <rect x="-45" y="-230" width="90" height="8" rx="2" fill="#D65200" opacity="0.4" />
    
    <path d="M -55,130 L 55,130 L 45,230 L -45,230 Z" fill="url(#band-gradient)" />
    <rect x="-45" y="222" width="90" height="8" rx="2" fill="#D65200" opacity="0.4" />

    <rect x="-65" y="-130" width="130" height="260" rx="36" fill="url(#case-gradient)" />
    <rect x="-61" y="-126" width="122" height="252" rx="32" fill="#0F0F11" />
    <rect x="-55" y="-120" width="110" height="240" rx="26" fill="url(#watch-screen-gradient)" />

    <text x="0" y="10" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="34" font-weight="600" fill="#FFFFFF" text-anchor="middle">09:41</text>
    <circle cx="0" cy="65" r="22" fill="none" stroke="#0F0F11" stroke-width="4" opacity="0.4" />
    <circle cx="0" cy="65" r="22" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="100 40" stroke-dashoffset="20" transform="rotate(-90 0 65)" />
    <text x="0" y="-75" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="10" font-weight="700" letter-spacing="1" fill="#FFFFFF" opacity="0.9" text-anchor="middle">N 45°21'00"</text>

    <rect x="65" y="-55" width="8" height="42" rx="3" fill="url(#case-gradient)" />
    <line x1="69" y1="-50" x2="73" y2="-50" stroke="#0F0F11" stroke-width="1.5" opacity="0.4" />
    <line x1="69" y1="-44" x2="73" y2="-44" stroke="#0F0F11" stroke-width="1.5" opacity="0.4" />
    <line x1="69" y1="-38" x2="73" y2="-38" stroke="#0F0F11" stroke-width="1.5" opacity="0.4" />
    <rect x="65" y="-41" width="3" height="14" fill="#F86800" />
    <rect x="65" y="5" width="5" height="34" rx="2" fill="url(#case-gradient)" />
  </g>
</svg>
