<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
    
      const cleanPath = path.replace('/react_phone-catalog', '') || '/';

      const redirectUrl =
        window.location.origin +
        '/react_phone-catalog/' +
        '?redirect=' +
        encodeURIComponent(cleanPath + search + hash);

      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
